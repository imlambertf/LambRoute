<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LambRoute">
<meta name="theme-color" content="#000000">
<title>LambRoute</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #000000;
  --bg2: #0a0a0a;
  --card: #1c1c1e;
  --card2: #2c2c2e;
  --border: #38383a;
  --green: #30d158;
  --green-soft: rgba(48,209,88,0.14);
  --green-mid: #25a244;
  --text: #ffffff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.3);
  --yellow: #ffd60a;
  --blue: #0a84ff;
  --red: #ff453a;
  --radius: 13px;
  --radius-lg: 20px;
}

.light-mode {
  --bg: #f2f2f7;
  --bg2: #ffffff;
  --card: #ffffff;
  --card2: #e5e5ea;
  --border: #c6c6c8;
  --text: #000000;
  --text2: rgba(0,0,0,0.55);
  --text3: rgba(0,0,0,0.3);
  --green-soft: rgba(48,209,88,0.12);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  height: 100dvh;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 1;
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
  z-index: 0;
}

/* ── LANG TOGGLE ── */
.lang-toggle {
  display: flex;
  background: var(--card);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}
.lang-opt {
  padding: 5px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
  font-family: inherit;
}
.lang-opt.active {
  background: var(--text);
  color: #000;
}
.light-mode .lang-opt.active { color: #ffffff; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  display: flex;
  background: var(--card);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}
.theme-opt {
  padding: 5px 10px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
  font-family: inherit;
}
.theme-opt.active {
  background: var(--text);
  color: var(--bg);
}

/* ── ONBOARDING ── */
#screenOnboard {
  padding: env(safe-area-inset-top, 44px) 0 env(safe-area-inset-bottom, 34px);
  overflow-y: auto;
}

.onboard-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 0;
}

.onboard-header {
  padding: 24px 24px 8px;
}
.onboard-eyebrow {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--green);
  margin-bottom: 4px;
}
.onboard-tagline {
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  margin-bottom: 16px;
  letter-spacing: 0.1px;
}
.onboard-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.onboard-sub {
  font-size: 15px;
  color: var(--text2);
  margin-top: 8px;
  line-height: 1.5;
}

.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.2px;
  padding: 20px 24px 8px;
  text-transform: uppercase;
}

.dest-list {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dest-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: var(--card);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
  gap: 14px;
}
.dest-item:active { background: var(--card2); }
.dest-item.selected {
  background: var(--green-soft);
  outline: 1.5px solid var(--green);
}

.dest-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  flex-shrink: 0;
}
.dest-item.selected .dest-num {
  background: var(--green);
  color: #000;
}

.dest-info { flex: 1; }
.dest-name { font-size: 16px; font-weight: 500; }
.dest-lm { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }

.dest-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--green);
  display: none;
  align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}
.dest-item.selected .dest-check { display: flex; }

.skip-row { padding: 12px 16px 0; }
.skip-btn-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: var(--card);
  border-radius: var(--radius);
  cursor: pointer;
  gap: 14px;
  transition: background 0.15s;
}
.skip-btn-row:active { background: var(--card2); }
.skip-btn-row.selected { background: rgba(10,132,255,0.12); outline: 1.5px solid var(--blue); }
.skip-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.skip-btn-row.selected .skip-icon { background: var(--blue); }

.onboard-footer { padding: 20px 16px 8px; }
.btn-start {
  width: 100%;
  padding: 16px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--radius-lg);
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  letter-spacing: -0.2px;
  opacity: 0.4;
  pointer-events: none;
}
.btn-start.ready { opacity: 1; pointer-events: all; }
.btn-start:active { transform: scale(0.98); opacity: 0.85; }

/* ── TRACKER SCREEN ── */
#screenTracker { overflow: hidden; }

#ticketBanner {
  background: rgba(255,214,10,0.1);
  border-bottom: 1px solid rgba(255,214,10,0.25);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  padding-top: max(10px, env(safe-area-inset-top));
}
#ticketBanner.gone { display: none; }
.ticket-icon { font-size: 16px; flex-shrink: 0; }
.ticket-text { flex: 1; font-size: 12px; font-weight: 500; color: var(--yellow); line-height: 1.4; }
.ticket-text span { opacity: 0.7; font-weight: 400; display: block; margin-top: 1px; }
.light-mode .ticket-text { color: #000000; }
.light-mode .ticket-text span { opacity: 1; font-weight: 500; }
.ticket-x {
  background: none; border: none;
  color: rgba(255,214,10,0.5);
  font-size: 20px; cursor: pointer;
  padding: 6px 8px; line-height: 1; flex-shrink: 0;
  font-family: inherit;
}
.light-mode .ticket-x { color: rgba(0,0,0,0.6); }

.nav-bar {
  padding: 12px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.nav-left { flex: 1; min-width: 0; }
.nav-route-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }
.nav-route-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.gear-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.2s;
}
.gear-btn:active { transform: scale(0.9); }

.gps-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  cursor: pointer; transition: all 0.2s;
  font-family: inherit;
  white-space: nowrap;
}
.gps-chip.on { border-color: var(--green); color: var(--green); background: var(--green-soft); }
.gps-chip:active { transform: scale(0.95); }
.gps-pip {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3); transition: all 0.3s; flex-shrink: 0;
}
.gps-pip.on { background: var(--green); box-shadow: 0 0 5px var(--green); }
.gps-pip.searching { background: var(--yellow); animation: blink 0.7s infinite; }

/* ── SETTINGS SHEET ── */
.settings-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.settings-overlay.show { opacity: 1; pointer-events: all; }
.settings-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  border-top-left-radius: var(--radius-lg); border-top-right-radius: var(--radius-lg);
  padding: 20px calc(16px + env(safe-area-inset-right, 0px)) calc(24px + env(safe-area-inset-bottom, 0px));
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.settings-overlay.show .settings-sheet { transform: translateY(0); }
.sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.sheet-title { font-size: 18px; font-weight: 700; }
.sheet-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 4px; }
.sheet-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
.sheet-row:last-child { border-bottom: none; }
.sheet-row span { font-size: 15px; font-weight: 600; }

#curCard {
  margin: 12px 14px 0;
  background: var(--green-soft);
  border: 1.5px solid var(--green);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  display: none;
  flex-shrink: 0;
  animation: fadeUp 0.3s ease;
}
#curCard.show { display: block; }
.cur-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--green); color: #000;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.4px; text-transform: uppercase;
  border-radius: 6px; padding: 3px 8px; margin-bottom: 8px;
}
.cur-stop-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
.cur-landmark { font-size: 12px; color: var(--text2); margin-top: 5px; line-height: 1.5; }
.cur-next {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid rgba(48,209,88,0.2);
  font-size: 13px; color: var(--text2);
}
.cur-next b { color: var(--text); }

#destAlert {
  margin: 8px 14px 0;
  background: rgba(10,132,255,0.12);
  border: 1.5px solid var(--blue);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: none;
  font-size: 13px; color: var(--blue);
  flex-shrink: 0;
  gap: 8px;
}
#destAlert.show { display: flex; align-items: center; }
#destAlert b { color: var(--text); }

#noGps {
  margin: 20px 14px 0;
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 28px 20px;
  text-align: center;
  display: none;
}
#noGps.show { display: block; }
.no-gps-icon { font-size: 40px; margin-bottom: 12px; }
.no-gps-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.no-gps-sub { font-size: 14px; color: var(--text2); line-height: 1.5; }

#reminders {
  margin: 8px 14px 0;
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: none;
  flex-shrink: 0;
}
#reminders.show { display: block; }
#reminders.dismissed { display: none !important; }
.rem-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
.rem-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); }
.rem-dismiss {
  background: none; border: none; color: var(--text3);
  font-size: 18px; cursor: pointer; padding: 4px 6px;
  line-height: 1; font-family: inherit; transition: color 0.2s;
}
.rem-dismiss:active { color: var(--text2); }
.rem-item { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--text2); padding: 3px 0; line-height: 1.4; }
.rem-item span { font-size: 15px; flex-shrink: 0; }

.list-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--text3);
  padding: 14px 20px 6px;
  flex-shrink: 0; display: none;
}
.list-label.show { display: block; }

.stop-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 14px calc(env(safe-area-inset-bottom, 20
